<!DOCTYPE html>
<html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pywebviewでテキストエディタ</title>
    <link rel="stylesheet" href="/static/style.css">
</head><body>
<h1>pywebviewでテキストエディタ</h1>
<div class="buttons">
    <button id="openBtn">ファイルを開く</button>
    <button id="saveBtn">ファイルを保存</button>
</div>
<div class="editorBox">
    <textarea id="editor" placeholder="ここにテキストを入力"></textarea>
</div>
<div id="status">起動準備中です</div>
<script>
// ステータスメッセージを表示する関数 --- (*1)
function showStatus(message) {
    const status = document.getElementById("status");
    status.textContent = message;
}
// pywebviewが準備できたら、イベントリスナーを設定する --- (*2)
window.addEventListener("pywebviewready", () => {
    // ボタンとエディタの要素を取得 --- (*3)
    const editor = document.getElementById("editor");
    const openBtn = document.getElementById("openBtn");
    const saveBtn = document.getElementById("saveBtn");
    const api = window.pywebview.api;
    // 「ファイルを開く」ボタンのクリックイベント --- (*4)
    openBtn.addEventListener("click", async () => {
        const result = await api.open_file();
        if (result === "ファイルが選択されませんでした") {
            showStatus(result);
            return;
        }
        editor.value = result;
        showStatus("ファイルを開きました");
    });
    // 「ファイルを保存」ボタンのクリックイベント --- (*5)
    saveBtn.addEventListener("click", async () => {
        const message = await api.save_file(editor.value);
        showStatus(message);
    });
});
</script>
</body>
</html>
