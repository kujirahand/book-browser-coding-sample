<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>判例RAGアシスタント</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <h1 class="rag">判例RAGアシスタント</h1>
  <form id="askForm">
    <input id="q" type="text" placeholder="例: 海に関する判例" required>
    <button id="askButton" type="submit">質問する</button>
  </form>
  <h2 class="rag">回答</h2>
  <div id="answer" class="result"></div>
  <h2 class="rag">参照コンテキスト</h2>
  <div id="contexts"></div>
  <div id="status"></div>
  <script>
    // DOM要素を取得
    const form = document.getElementById("askForm");
    const qInput = document.getElementById("q");
    const askButton = document.getElementById("askButton");
    const statusEl = document.getElementById("status");
    const answerEl = document.getElementById("answer");
    const contextsEl = document.getElementById("contexts");
    // フォームのsubmitイベントを処理 --- (*1)
    form.addEventListener("submit", async (e) => {
      e.preventDefault(); // デフォルトの動作を無効にする
      // クエリーqを取得 --- (*2)
      const q = qInput.value.trim();
      if (!q) return;
      askButton.disabled = true;
      statusEl.textContent = "回答を生成中...";
      answerEl.textContent = "";
      contextsEl.innerHTML = "";
      try {
        // クエリーをRAGサーバーに送信する --- (*3)
        const url = `/ask?q=${encodeURIComponent(q)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.error || "エラーが発生しました";
          return;
        }
        statusEl.textContent = "完了";
        // LLMからの応答を表示 --- (*4)
        answerEl.innerHTML = marked.parse(data.answer) || "";
        // 参照コンテキストを表示
        for (const c of data.contexts || []) {
          const box = document.createElement("div");
          box.className = "result";
          box.textContent = `source=${c.source} | score=${Number(c.score).toFixed(4)} | chunk=${c.chunk_id}`;
          contextsEl.appendChild(box);
        }
      } catch (err) {
        statusEl.textContent = `通信エラー: ${err}`;
      } finally {
        askButton.disabled = false;
      }
    });
  </script>
</body>
</html>
