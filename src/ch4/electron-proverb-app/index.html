<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Electronでプロセス間通信のテスト</title>
        <style>
            #msg {
                margin-top: 20px;
                padding: 10px;
                border: 1px solid #ccc;
                background-color: #f9f9f9;
            }
        </style>
    </head>
    <body>
        <h1>ファイルを読み込んで表示</h1>
        <div id="msg">ここにテキストが表示される</div>
    </body>
    <script>
        // レンダリングプロセス --- (※1)
        const { ipcRenderer } = require("electron");
        // ページが読み込まれたときにプロセス間通信を行う
        window.onload = async () => {
            try {
                // メインプロセスからテキストを取得 --- (※2)
                const proverb = await ipcRenderer.invoke("getProverb");
                // 取得したテキストを表示
                document.getElementById("msg").textContent = proverb;
            } catch (error) {
                console.error("エラー:", error);
            }
        };
    </script>
</html>
