<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Electronのテスト</title>
    </head>
    <body style="text-align: center;">
        <h1>Electronで作ったサイコロ</h1>
        <div id="msg" style="font-size:120px;">?</div>
        <button onclick="changeValue()">サイコロを振る</button>
    </body>
    <script>
        // サイコロの値を変更する関数を定義
        function changeValue() {
            const msg = document.querySelector('#msg');
            const dice = Math.floor(Math.random() * 6) + 1;
            msg.textContent = dice;
        }
    </script>
</html>
