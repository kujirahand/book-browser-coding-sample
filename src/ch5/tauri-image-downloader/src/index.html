<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像ダウンローダー</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>画像ダウンローダー</h1>
      <form class="row" id="download-form">
        <input id="target-url" type="url"
          placeholder="画像を集めるページURLを入力"
          required />
        <button type="submit">ダウンロード</button>
      </form>
      <p id="status-msg"></p>
      <section class="result-panel">
        <h2>画像URL一覧</h2>
        <ul id="image-urls"></ul>
      </section>
      <section class="result-panel">
        <h2>保存先ファイル一覧</h2>
        <ul id="downloaded-files"></ul>
      </section>
    </main>
  </body>
</html>
