<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>支店別売上可視化ツール</title>
    <!--「Chart.js」を取り込む --- (*1) -->
    <script src="/assets/chart.umd.min.js" defer></script>
    <!-- フロントエンド側のメインプログラムを読む --- (*2) -->
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="container">
      <section class="panel controls">
        <button id="load-btn" type="button">CSVをリロード</button>
        <p id="status-msg" role="status">-</p>
      </section>
      <section class="panel"><!-- グラフ表示エリア --- (*3) -->
        <h2>支店別 売上合計</h2>
        <div class="chart-wrap">
          <canvas id="sales-chart-canvas" aria-label="支店別売上グラフ" role="img" height="360"></canvas>
        </div>
      </section>
      <section class="panel"><!-- 集計結果を表示するエリア --- (*4) -->
        <h2>集計結果</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>支店</th><th>売上合計</th><th>取引件数</th></tr>
            </thead>
            <tbody id="result-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
